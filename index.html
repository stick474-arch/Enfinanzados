<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>💑 Finanzas en Pareja</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:Georgia,serif;}
body{background:#0a0a12;color:#f0eff4;min-height:100vh;}
#app{min-height:100vh;}
.body-layout{display:flex;}
#content{flex:1;min-width:0;padding-bottom:80px;}
.hdr{background:linear-gradient(135deg,#12112a,#0e1428);padding:18px 16px 14px;border-bottom:1px solid #1e1e3a;position:sticky;top:0;z-index:50;}
.hdr h1{font-size:20px;color:#c9a227;margin:0;}
.hdr small{font-size:11px;color:#4a4a6a;font-family:monospace;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.sec{padding:14px 14px 6px;}
.card{background:#12121e;border:1px solid #1e1e3a;border-radius:14px;padding:14px;margin-bottom:12px;}
.card-gold{background:linear-gradient(135deg,#1a1428,#141428);border:1px solid #2a2040;}
.card-blue{background:linear-gradient(135deg,#121a28,#121428);border:1px solid #1e2a3a;}
.card-warn{background:#1a1510;border:1px solid #c9a22744;}
.ct{font-size:10px;color:#4a4a6a;text-transform:uppercase;letter-spacing:.12em;font-family:monospace;margin-bottom:10px;}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.lbl{font-size:13px;color:#8080a0;}
.val{font-size:14px;font-weight:600;}
.big{font-size:28px;font-weight:700;color:#c9a227;}
.green{color:#4caf80;} .red{color:#ef5350;} .gold{color:#c9a227;} .blue{color:#64b5f6;} .orange{color:#ff8a65;}
.div{height:1px;background:#1e1e3a;margin:9px 0;}
input,select{width:100%;background:#0e0e1a;border:1px solid #1e1e3a;border-radius:10px;padding:11px 14px;color:#f0eff4;font-size:15px;font-family:Georgia,serif;box-sizing:border-box;margin-bottom:10px;outline:none;}
input::placeholder{color:#4a4a6a;}
.inp-big{font-size:26px;border:2px solid #c9a22744;border-radius:14px;text-align:center;color:#c9a227;font-family:monospace;padding:16px;}
.btn{width:100%;padding:14px;background:#c9a227;border:none;border-radius:12px;color:#0a0a12;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:Georgia,serif;}
.btn-green{background:#4caf80;color:#fff;}
.btn-dark{background:#1e1e3a;color:#f0eff4;border:1px solid #2a2a4a;}
.btn-sm{padding:7px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:monospace;}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.chip{padding:6px 13px;border:1px solid #1e1e3a;border-radius:20px;font-size:12px;background:transparent;color:#6060a0;cursor:pointer;font-family:monospace;transition:all .15s;}
.chip.on{border-color:#c9a227;background:#c9a22720;color:#c9a227;font-weight:600;}
.tag{font-size:10px;padding:3px 8px;border-radius:10px;font-family:monospace;display:inline-block;}
.fl{font-size:10px;color:#4a4a6a;font-family:monospace;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;display:block;}
.bar-wrap{height:10px;border-radius:5px;background:#1e1e3a;overflow:hidden;margin:6px 0;}
.bar{height:100%;border-radius:5px;transition:width .6s ease;}
.nav{position:fixed;bottom:0;left:0;right:0;background:#0e0e1a;border-top:1px solid #1e1e3a;display:flex;z-index:100;}
.nb{flex:1;padding:8px 2px 10px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nb-icon{font-size:18px;padding:3px 6px;border-radius:8px;}
.nb-lbl{font-size:9px;color:#4a4a6a;font-family:monospace;}
.nb.on .nb-lbl{color:#c9a227;}
.nb.on .nb-icon{background:#c9a22718;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e2d1e;border:1px solid #4caf8066;color:#4caf80;padding:10px 20px;border-radius:20px;font-size:13px;font-family:monospace;z-index:999;white-space:nowrap;animation:toastIn .3s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.hide{display:none!important;}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:#1e1e2e;outline:none;padding:0;margin-bottom:10px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#c9a227;cursor:pointer;}
input[type=checkbox]{width:18px;height:18px;accent-color:#c9a227;margin:0;}
.help-box{background:#0e0e1a;border:1px solid #1e1e3a;border-radius:10px;padding:11px 14px;margin-bottom:12px;font-size:12px;color:#6060a0;line-height:1.6;}
.ie-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #1e1e3a;}
.ie-row input{margin-bottom:0;flex:1;font-size:13px;padding:8px 12px;}
.card-loan{background:linear-gradient(135deg,#0e1a20,#0e1a2a);border:1px solid #1e3040;}
@media(min-width:768px){
  #app{max-width:1200px;margin:0 auto;}
  #content{padding-bottom:20px;max-width:700px;}
  .nav{position:sticky;top:0;height:calc(100vh - 57px);width:190px;flex-direction:column;border-top:none;border-right:1px solid #1e1e3a;border-bottom:none;left:auto;right:auto;flex-shrink:0;overflow-y:auto;padding:6px 0;}
  .nb{flex:none;flex-direction:row;padding:11px 16px;justify-content:flex-start;gap:10px;width:100%;align-items:center;}
  .nb-icon{font-size:15px;width:24px;text-align:center;padding:0;background:none!important;}
  .nb-lbl{font-size:12px;color:#5a5a8a;}
  .nb.on .nb-lbl{color:#c9a227;}
  .nb.on{background:#c9a22714;border-radius:0;}
  .toast{bottom:20px;}
}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="row" style="margin-bottom:2px;">
      <h1 id="hdr-title">💑 Finanzas en Pareja</h1>
      <div><span class="dot" id="fb-dot" style="background:#ef5350;"></span><span id="fb-lbl" style="font-size:10px;color:#4a4a6a;font-family:monospace;">conectando…</span></div>
    </div>
    <small id="hdr-sub">cargando…</small>
  </div>
  <div class="body-layout">
    <nav class="nav" id="nav"></nav>
    <div id="content"></div>
  </div>
</div>
<div id="toast-box"></div>

<script>
// ── Firebase Realtime Database REST (no API key needed in test mode) ─────────
const RTDB_URL = "https://finanzas-9e3db-default-rtdb.firebaseio.com/finanzas.json";

let localData = null;
let saving = false;
let fbOnline = false;

function emptyState(){
  return{entries:[],balances:{A:0,B:0},settled:[],names:{A:"Marce",B:"John"},
    cats:{shared:["Casa / Arriendo","Parqueadero","Servicios","Mercado","Deuda banco","Otro compartido"],
    personal:["Transporte","Ropa","Salud","Entretenimiento","Deuda personal","Otro personal"]},
    goals:[],split:{A:50,B:50},recurring:[],budgets:{},loans:[],viajes:[],catSettled:[]};
}

async function loadFromFirebase(){
  try{
    const r=await fetch(RTDB_URL);
    if(!r.ok)return null;
    const data=await r.json();
    return data;
  }catch(e){return null;}
}

async function saveToFirebase(data){
  try{
    const r=await fetch(RTDB_URL,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
    return r.ok;
  }catch(e){return false;}
}

async function persist(newData){
  saving=true;localData=newData;
  updateSavingUI(true);
  const ok=await saveToFirebase(newData);
  fbOnline=ok;saving=false;
  updateSavingUI(false);
  render();
}

function updateSavingUI(s){
  const dot=document.getElementById("fb-dot");
  const lbl=document.getElementById("fb-lbl");
  if(dot)dot.style.background=s?"#c9a227":fbOnline?"#4caf80":"#ef5350";
  if(lbl)lbl.textContent=s?"guardando…":fbOnline?"en vivo ✓":"local";
}

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt=n=>new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n||0);
const fmtS=n=>{if(Math.abs(n)>=1000000)return"$"+(n/1000000).toFixed(1)+"M";if(Math.abs(n)>=1000)return"$"+(n/1000).toFixed(0)+"K";return fmt(n);};
// Format amount input with thousands separators while typing, store raw to state
function fmtAmountInput(el,setter){
  const raw=el.value.replace(/[^0-9]/g,"");
  setter(raw);
  if(raw===""){el.value="";return;}
  el.value=new Intl.NumberFormat("es-CO").format(parseInt(raw));
  // keep cursor at end
  const len=el.value.length;
  try{el.setSelectionRange(len,len);}catch(e){}
}
// Format an initial value for display in an amount field
function fmtInit(v){if(v===""||v===null||v===undefined)return "";return new Intl.NumberFormat("es-CO").format(parseInt(v)||0);}
const today=()=>new Date().toISOString().slice(0,10);
const thisMonth=()=>new Date().toISOString().slice(0,7);
const ICONS={"Casa / Arriendo":"🏠","Parqueadero":"🚗","Servicios":"💡","Mercado":"🛒","Deuda banco":"🏦","Otro compartido":"📦","Transporte":"🚌","Ropa":"👗","Salud":"💊","Entretenimiento":"🎬","Deuda personal":"💳","Otro personal":"🎒"};
const hasEmoji=s=>/^\p{Emoji_Presentation}/u.test(s||"");
const icon=c=>{if(!c)return"📌";if(hasEmoji(c))return"";return ICONS[c]||"📌";};
const catDisplay=c=>{if(!c)return"";if(hasEmoji(c))return c;return(ICONS[c]||"📌")+" "+c;};
const PAL=["#c9a227","#4caf80","#ff8a65","#64b5f6","#ba68c8","#f06292","#4db6ac","#ffb74d"];
function showToast(msg){
  const b=document.getElementById("toast-box");
  b.innerHTML=`<div class="toast">${msg}</div>`;
  setTimeout(()=>b.innerHTML="",2200);
}
function nm(u){const n=D().names;return u==="A"?n.A:u==="B"?n.B:"Compartido";}
function D(){return localData||emptyState();}
function migrate(d){
  const e=emptyState();
  ["names","cats","goals","split","settled","recurring","budgets","loans","entries","balances","viajes","catSettled"].forEach(k=>{if(!d[k])d[k]=e[k];});
  return d;
}
// Compute net balance from A's perspective. Positive = B owes A. Negative = A owes B.
function computeBalance(d){
  d=d||D();
  const sp=d.split||{A:50,B:50};
  const spA=sp.A/100;
  let netA=0;
  (d.entries||[]).forEach(e=>{
    if(e.type==="expense"&&e.user==="shared"){
      const fairA=e.amount*spA;
      const paidA=e.paidBy==="A"?e.amount:0;
      netA+=paidA-fairA;
    }
  });
  // Settlements reduce the balance
  (d.settled||[]).forEach(s=>{
    // if A was owed (from=B,to=A meaning B paid A), reduce netA
    if(s.to==="A")netA-=s.amount;
    else if(s.to==="B")netA+=s.amount;
  });
  return netA;
}

// ── State ──────────────────────────────────────────────────────────────────
let tab="resumen";
let filterUser="all",filterType="all",filterMonth="all",searchQ="";
let settingsTab="names";
let chartUser="all",chartMonth=thisMonth();
let showNewLoan=false;
let editId=null;
let confirmDeleteId=null;
let confirmDeleteLoanId=null;
let payAmounts={};
let formState={type:"expense",user:"shared",category:"",description:"",amount:"",date:today(),paidBy:"A",debtMonths:12,debtStart:today(),note:"",isRecurring:false,registeredBy:"A"};
let cuentasMonth="all";
let cuentasExpanded={};
let viajeTab="list";
let selectedViaje=null;
let newViaje={name:"",date:today(),desc:""};
let lastSeenCount=parseInt(localStorage.getItem("lastSeenCount")||"0");
let newLoan={from:"A",to:"B",amount:"",description:"",date:today(),installments:1,note:""};
let newGoal={name:"",target:"",current:"",deadline:""};
let newBudget={category:"",amount:""};
let newCat={type:"shared",name:""};
let splitVal=50;
let editCatIdx=null;
let editCatVal="";
let projMonths=12;
let projExpandedRec=null;
let projOverrideEdit=null;
let projOverrideVal="";
let projAmorId=null;
let projAmorData={balance:"",rate:"",months:""};
let qpDebtId=null;
let qpDebtWho="A";
let qpDebtAmt="";

// ── Nav ─────────────────────────────────────────────────────────────────────
const TABS=[["resumen","📊","Inicio"],["agregar","＋","Agregar"],["historial","📋","Historial"],["cuentas","🗂️","Cuentas"],["viajes","✈️","Viajes"],["prestamos","🤝","Préstamos"],["graficas","📈","Gráficas"],["proyeccion","📉","Proyec."],["ajustes","⚙️","Ajustes"]];

function renderNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML=TABS.map(([id,ic,lb])=>`
    <button class="nb${tab===id?" on":""}" onclick="setTab('${id}')">
      <span class="nb-icon">${ic}</span>
      <span class="nb-lbl">${lb}</span>
    </button>`).join("");
}

function setTab(t){if(tab==="agregar"&&t!=="agregar")editId=null;if(t!=="ajustes")editCatIdx=null;tab=t;if(t!=="viajes")selectedViaje=null;if(t==="agregar"&&!editId)resetForm();render();}

function resetForm(){
  formState={type:"expense",user:"shared",category:"",description:"",amount:"",date:today(),paidBy:"A",debtMonths:12,debtStart:today(),note:"",isRecurring:false,registeredBy:"A"};
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  const d=D();
  document.getElementById("hdr-title").textContent=`💑 ${d.names.A} & ${d.names.B}`;
  document.getElementById("hdr-sub").textContent=`División ${d.split.A}/${d.split.B}`;
  renderNav();
  const views={resumen:renderResumen,agregar:renderAgregar,historial:renderHistorial,cuentas:renderCuentas,viajes:renderViajes,prestamos:renderPrestamos,graficas:renderGraficas,proyeccion:renderProyeccion,ajustes:renderAjustes};
  document.getElementById("content").innerHTML=(views[tab]||renderResumen)();
  bindEvents();
}

// ── Resumen ────────────────────────────────────────────────────────────────
function renderResumen(){
  const d=D();
  // New entries notification
  const currentCount=(d.entries||[]).length;
  const newCount=currentCount-lastSeenCount;
  const sp=d.split||{A:50,B:50};
  const spA=sp.A/100,spB=sp.B/100;
  const netBal=computeBalance(d);
  const balA=netBal,balB=-netBal;
  const tm=thisMonth();
  const me=(d.entries||[]).filter(e=>e.date&&e.date.startsWith(tm));
  const tS=me.filter(e=>e.type==="expense"&&e.user==="shared").reduce((s,e)=>s+e.amount,0);
  const tA=me.filter(e=>e.type==="expense"&&e.user==="A").reduce((s,e)=>s+e.amount,0);
  const tB=me.filter(e=>e.type==="expense"&&e.user==="B").reduce((s,e)=>s+e.amount,0);
  const iA=me.filter(e=>e.type==="income"&&e.user==="A").reduce((s,e)=>s+e.amount,0);
  const iB=me.filter(e=>e.type==="income"&&e.user==="B").reduce((s,e)=>s+e.amount,0);
  const debts=(d.entries||[]).filter(e=>e.type==="debt");
  const dS=debts.filter(e=>e.user==="shared").reduce((s,e)=>s+e.amount,0);
  const dA=debts.filter(e=>e.user==="A").reduce((s,e)=>s+e.amount,0);
  const dB=debts.filter(e=>e.user==="B").reduce((s,e)=>s+e.amount,0);
  const wa=new Date();wa.setDate(wa.getDate()-7);
  const ws=wa.toISOString().slice(0,10);
  const wk=(d.entries||[]).filter(e=>e.date>=ws&&e.type==="expense");
  const wt=wk.reduce((s,e)=>s+e.amount,0);
  const wsh=wk.filter(e=>e.user==="shared").reduce((s,e)=>s+e.amount,0);

  // Loans: netLoanA > 0 means B owes A (A lent to B)
  const activeLoans=(d.loans||[]).filter(l=>l.status==="active");
  const netLoanA=activeLoans.reduce((s,l)=>{
    const rem=l.amount-l.paid;
    return l.from==="A"?s+rem:s-rem;
  },0);

  const budgets=d.budgets||{};
  const alerts=Object.entries(budgets).map(([cat,lim])=>{
    const sp2=me.filter(e=>e.type==="expense"&&e.category===cat).reduce((s,e)=>s+e.amount,0);
    return{cat,lim,sp2,pct:sp2/lim*100};
  }).filter(b=>b.pct>=70).sort((a,b)=>b.pct-a.pct);

  const totalNet=balA+netLoanA;
  let balHtml="";
  if(Math.abs(balA)<1&&Math.abs(netLoanA)<1){
    balHtml=`<div class="green" style="font-size:14px;">✅ Están al día — ninguno debe nada</div>`;
  }else{
    const expWho=balA<0?`${d.names.A} le debe a ${d.names.B}`:`${d.names.B} le debe a ${d.names.A}`;
    const loanWho=netLoanA<0?`${d.names.A} le debe a ${d.names.B}`:`${d.names.B} le debe a ${d.names.A}`;
    const totalWho=totalNet<0?`${d.names.A} le debe a ${d.names.B}`:`${d.names.B} le debe a ${d.names.A}`;
    const hasBoth=Math.abs(balA)>1&&Math.abs(netLoanA)>1;
    balHtml=``;
    if(Math.abs(balA)>1){
      balHtml+=`<div class="row" style="margin-bottom:2px;"><span style="font-size:12px;color:#8080a0;">📊 Gastos compartidos</span><span style="font-size:15px;font-weight:700;font-family:monospace;">${fmtS(Math.abs(balA))}</span></div>
      <div style="font-size:11px;color:#6060a0;margin-bottom:8px;">${expWho}</div>`;
    }
    if(Math.abs(netLoanA)>1){
      balHtml+=`<div class="row" style="margin-bottom:2px;"><span style="font-size:12px;color:#8080a0;">🤝 Préstamos (${activeLoans.length})</span><span style="font-size:15px;font-weight:700;font-family:monospace;color:#4db6ac;">${fmtS(Math.abs(netLoanA))}</span></div>
      <div style="font-size:11px;color:#6060a0;margin-bottom:8px;">${loanWho}</div>`;
    }
    if(hasBoth){
      balHtml+=`<div style="height:1px;background:#2a2040;margin:4px 0 10px;"></div>
      <div class="big">${fmtS(Math.abs(totalNet))}</div>
      <div class="lbl" style="margin:4px 0 12px;">${totalWho} <span style="font-size:10px;">(total)</span></div>`;
    }else{
      const singleAmt=Math.abs(balA)>1?Math.abs(balA):Math.abs(netLoanA);
      const singleWho=Math.abs(balA)>1?expWho:loanWho;
      balHtml=`<div class="big">${fmtS(singleAmt)}</div><div class="lbl" style="margin:4px 0 12px;">${singleWho}</div>`;
    }
    if(Math.abs(balA)>1){
      balHtml+=`<button class="btn btn-green" onclick="doSettle()">✓ Saldar gastos compartidos</button>`;
    }
  }
  const settledHtml=(d.settled||[]).slice(-2).reverse().map(sl=>`
    <div class="row" style="margin-bottom:3px;">
      <span style="font-size:11px;color:#4a4a6a;font-family:monospace;">${sl.date} · ${nm(sl.from)}→${nm(sl.to)}</span>
      <span style="font-size:11px;color:#4caf80;font-family:monospace;">${fmtS(sl.amount)}</span>
    </div>`).join("");

  const alertsHtml=alerts.length>0?`
    <div class="card card-warn">
      <div class="ct" style="color:#c9a227;">⚠️ Alertas de presupuesto</div>
      ${alerts.map(b=>`
        <div style="margin-bottom:10px;">
          <div class="row"><span style="font-size:13px;">${icon(b.cat)} ${b.cat}</span><span style="font-size:12px;color:${b.pct>=100?"#ef5350":"#c9a227"};font-family:monospace;font-weight:600;">${Math.round(b.pct)}%${b.pct>=100?" ⚠️":""}</span></div>
          <div class="bar-wrap"><div class="bar" style="width:${Math.min(b.pct,100)}%;background:${b.pct>=100?"#ef5350":"#c9a227"};"></div></div>
          <div style="font-size:10px;color:#4a4a6a;font-family:monospace;">${fmt(b.sp2)} de ${fmt(b.lim)}</div>
        </div>`).join("")}
    </div>`:"";

  const goalsHtml=(d.goals||[]).length>0?`
    <div class="card">
      <div class="ct">Metas de ahorro</div>
      ${(d.goals||[]).map(g=>{
        const pct=Math.min(100,g.current/g.target*100);
        return`<div style="margin-bottom:14px;">
          <div class="row"><span style="font-size:14px;font-weight:600;">${g.name}</span><span style="font-size:12px;color:#c9a227;font-family:monospace;">${Math.round(pct)}%</span></div>
          <div class="row" style="margin-bottom:5px;"><span style="font-size:11px;color:#4a4a6a;font-family:monospace;">${fmt(g.current)}</span><span style="font-size:11px;color:#4a4a6a;font-family:monospace;">${fmt(g.target)}</span></div>
          <div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${pct>=100?"#4caf80":"#c9a227"};box-shadow:0 0 8px ${pct>=100?"#4caf8060":"#c9a22760"};"></div></div>
          ${g.deadline?`<div style="font-size:10px;color:#4a4a6a;margin-top:3px;font-family:monospace;">Meta: ${g.deadline} · faltan ${fmt(g.target-g.current)}</div>`:""}
        </div>`;}).join("")}
    </div>`:"";

  // Mark as seen
  const notifHtml=newCount>0&&lastSeenCount>0?`
    <div style="background:#1a1f2e;border:1px solid #64b5f644;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;" onclick="dismissNotif()">
      <div>

  return`<div class="sec">

        <div style="width:1px;background:#1e1e3a;"></div>
        <div style="text-align:center;"><div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:3px;">${d.names.B.toUpperCase()}</div><div style="font-size:20px;font-weight:700;color:#ff8a65;">${fmtS(tB)}</div></div>
      </div>

function renderDebtsCard(debts,d){
  const sp=d.split||{A:50,B:50};
  const spA=sp.A/100,spB=sp.B/100;
  let html=`<div class="card"><div class="ct">Deudas · pago rápido de cuota</div>`;
  debts.forEach(de=>{
    const months=de.debtMonths||1;
    const cuota=months>1?Math.round(de.amount/months):de.amount;
    const isShared=de.user==="shared";
    const isQp=qpDebtId===de.id;
    const paysAmt=Number(qpDebtAmt)||cuota;
    const owesAmt=qpDebtWho==="A"?Math.round(paysAmt*spB):Math.round(paysAmt*spA);
    const owesName=qpDebtWho==="A"?d.names.B:d.names.A;
    html+=`<div style="padding:10px 0;border-bottom:1px solid #1e1e3a22;">
      <div class="row" style="margin-bottom:4px;">
        <span style="font-size:13px;font-weight:600;">${icon(de.category)} ${de.description}</span>
        <span class="tag" style="background:${isShared?"#c9a22718":"#1e1e3a"};color:${isShared?"#c9a227":"#6060a0"};border:1px solid ${isShared?"#c9a22744":"#2a2a4a"};">${isShared?"Compartida":nm(de.user)}</span>
      </div>
      <div style="font-size:11px;color:#4a4a6a;font-family:monospace;margin-bottom:8px;">Total: ${fmtS(de.amount)}${months>1?` · Cuota ~${fmtS(cuota)}/mes · ${months} meses`:""}</div>`;
    if(isQp){
      html+=`<div style="background:#0e0e1a;border-radius:8px;padding:10px;border:1px solid #c9a22733;margin-top:4px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="font-size:12px;color:#8080a0;">Monto:</span>
          <input id="qp-amt" type="text" style="flex:1;margin:0;font-size:14px;padding:7px 10px;" value="${fmtInit(qpDebtAmt||String(cuota))}" oninput="fmtAmountInput(this,v=>qpDebtAmt=v)" placeholder="${fmtInit(cuota)}"/>
        </div>
        ${isShared?`<div style="font-size:11px;color:#6060a0;font-family:monospace;margin-bottom:10px;">${nm(qpDebtWho)} pagó todo → <span style="color:#c9a227;font-weight:700;">${owesName} deberá ${fmtS(owesAmt)}</span> a ${nm(qpDebtWho)}</div>`:""}
        <div style="display:flex;gap:6px;">
          <button class="btn btn-green" style="margin:0;flex:1;padding:10px;font-size:13px;" onclick="doQuickPayDebt(${de.id})">✓ Confirmar</button>
          <button class="btn btn-dark" style="margin:0;flex:1;padding:10px;font-size:13px;" onclick="qpDebtId=null;render()">✕</button>
        </div>
      </div>`;
    }else{
      html+=`<div style="display:flex;gap:6px;flex-wrap:wrap;">`;
      if(isShared){
        html+=`<button class="btn-sm" style="background:#64b5f618;border:1px solid #64b5f633;color:#64b5f6;padding:6px 10px;" data-id="${de.id}" data-who="A" data-amt="${cuota}" onclick="qpDebtId=Number(this.dataset.id);qpDebtWho=this.dataset.who;qpDebtAmt=this.dataset.amt;render()">${d.names.A} pagó</button>`;
        html+=`<button class="btn-sm" style="background:#ff8a6518;border:1px solid #ff8a6533;color:#ff8a65;padding:6px 10px;" data-id="${de.id}" data-who="B" data-amt="${cuota}" onclick="qpDebtId=Number(this.dataset.id);qpDebtWho=this.dataset.who;qpDebtAmt=this.dataset.amt;render()">${d.names.B} pagó</button>`;
      }else{
        html+=`<button class="btn-sm" style="background:#4caf8018;border:1px solid #4caf8033;color:#4caf80;padding:6px 10px;" data-id="${de.id}" data-who="${de.user}" data-amt="${cuota}" onclick="qpDebtId=Number(this.dataset.id);qpDebtWho=this.dataset.who;qpDebtAmt=this.dataset.amt;render()">Registrar pago de cuota</button>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  return html+`</div>`;
}

// ── Historial ──────────────────────────────────────────────────────────────
function renderHistorial(){
  const d=D();
  const allMonths=[...new Set((d.entries||[]).map(e=>e.date&&e.date.slice(0,7)).filter(Boolean))].sort().reverse();
  let list=[...(d.entries||[])].reverse().filter(e=>{
    if(filterUser!=="all"&&e.user!==filterUser)return false;
    if(filterType!=="all"&&e.type!==filterType)return false;
    if(filterMonth!=="all"&&!(e.date&&e.date.startsWith(filterMonth)))return false;
    if(searchQ&&!`${e.description} ${e.category} ${e.note||""}`.toLowerCase().includes(searchQ.toLowerCase()))return false;
    return true;
  });
  const total=list.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0);
  return`<div class="sec">
    <div class="chips">
      ${[["all","Todos"],["A",d.names.A],["B",d.names.B],["shared","Compartido"]].map(([v,l])=>`<div class="chip${filterUser===v?" on":""}" onclick="filterUser='${v}';render()">${l}</div>`).join("")}
    </div>
    <div class="chips">
      ${[["all","Todo"],["expense","Gastos"],["income","Ingresos"],["debt","Deudas"]].map(([v,l])=>`<div class="chip${filterType===v?" on":""}" onclick="filterType='${v}';render()">${l}</div>`).join("")}
    </div>
    <select style="margin-bottom:10px;" onchange="filterMonth=this.value;render()">
      <option value="all"${filterMonth==="all"?" selected":""}>Todos los meses</option>
      ${allMonths.map(m=>`<option value="${m}"${filterMonth===m?" selected":""}>${m}</option>`).join("")}
    </select>
    <div style="position:relative;margin-bottom:10px;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;">🔍</span>
      <input style="padding-left:36px;margin-bottom:0;" type="text" placeholder="Buscar…" value="${searchQ}" oninput="searchQ=this.value;render()"/>
    </div>
    ${filterType==="expense"&&total>0?`<div class="card" style="padding:10px 14px;margin-bottom:10px;background:#1a1420;">
      <div class="row" style="margin:0;"><span style="font-size:12px;color:#6060a0;">Total filtrado</span><span style="font-size:18px;font-weight:700;color:#c9a227;">${fmt(total)}</span></div>
    </div>`:""}
    ${list.map(e=>`
      <div style="display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #1e1e3a;align-items:flex-start;">
        <div style="flex:1;margin-right:8px;">
          <div style="font-size:14px;margin-bottom:4px;font-weight:500;">${icon(e.category)} ${e.description}</div>
          ${e.note?`<div style="font-size:11px;color:#4a4a6a;margin-bottom:4px;font-style:italic;">${e.note}</div>`:""}
          <div style="display:flex;gap:5px;flex-wrap:wrap;">
            <span class="tag" style="background:${e.type==="income"?"#4caf8018":e.type==="debt"?"#ef535018":"#c9a22718"};color:${e.type==="income"?"#4caf80":e.type==="debt"?"#ef5350":"#c9a227"};border:1px solid ${e.type==="income"?"#4caf8033":e.type==="debt"?"#ef535033":"#c9a22733"};">${e.type==="income"?"ingreso":e.type==="debt"?"deuda":"gasto"}</span>
            <span class="tag" style="background:#4a4a8a18;color:#8080c0;border:1px solid #4a4a8a33;">${e.user==="shared"?"compartido":"solo "+nm(e.user)}</span>
            ${e.paidBy?`<span class="tag" style="background:#ff8a6518;color:#ff8a65;border:1px solid #ff8a6533;">pagó ${nm(e.paidBy)}</span>`:""}
            ${e.registeredBy?`<span class="tag" style="background:#6060a018;color:#8080b0;border:1px solid #6060a033;">por ${nm(e.registeredBy)}</span>`:""}
            <span style="font-size:10px;color:#4a4a6a;font-family:monospace;">${e.date}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:14px;font-weight:700;font-family:monospace;color:${e.type==="income"?"#4caf80":e.type==="debt"?"#ef5350":"#f0eff4"};">${e.type==="income"?"+":"-"}${fmtS(e.amount)}</div>
          <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:5px;">
            <span style="font-size:14px;cursor:pointer;" onclick="doEditEntry('${e.id}')">✏️</span>
            <span style="font-size:${confirmDeleteId===e.id?11:14}px;cursor:pointer;color:${confirmDeleteId===e.id?"#ef5350":"inherit"};font-family:${confirmDeleteId===e.id?"monospace":"inherit"};" onclick="doDeleteEntry('${e.id}')">${confirmDeleteId===e.id?"¿Seguro?":"🗑️"}</span>
          </div>
        </div>
      </div>`).join("")}
    ${list.length===0?`<div style="color:#4a4a6a;text-align:center;margin-top:48px;font-size:14px;">Sin registros</div>`:""}
    ${list.length>0?`<button class="btn btn-dark" style="margin-top:16px;font-size:13px;" onclick="doExportCSV()">📥 Exportar CSV (${list.length} registros)</button>`:""}
  </div>`;
}

function dismissNotif(){const d=D();lastSeenCount=(d.entries||[]).length;localStorage.setItem("lastSeenCount",String(lastSeenCount));render();}
function setViajeTab(n){viajeTab=n===0?"list":"assign";render();}
function doDeleteViajeConfirm(id){if(window.confirm("Eliminar este viaje?"))doDeleteViaje(id);}

function renderViajes(){
  const d=D();
  const viajes=d.viajes||[];
  const nA=d.names.A,nB=d.names.B;
  const sp=d.split||{A:50,B:50};
  const spA=sp.A/100,spB=sp.B/100;
  const Q='"';
  function attr(k,v){return " "+k+"="+Q+v+Q;}
  function el(tag,attrs,inner){return "<"+tag+attrs+">"+inner+"</"+tag+">";}
  let html="<div class=\"sec\">";

  if(selectedViaje!==null){
    const v=viajes.find(x=>x.id===selectedViaje);
    if(!v){selectedViaje=null;return renderViajes();}
    const vIds=v.entries||[];
    const vEntries=(d.entries||[]).filter(e=>e.type==="expense"&&(vIds.includes(e.id)||vIds.includes(Number(e.id))));
    const total=vEntries.reduce((s,e)=>s+e.amount,0);
    const sharedTotal=vEntries.filter(e=>e.user==="shared").reduce((s,e)=>s+e.amount,0);
    const paidA=vEntries.filter(e=>e.user==="shared"&&e.paidBy==="A").reduce((s,e)=>s+e.amount,0);
    const balA=paidA-(sharedTotal*spA);

    html+="<button class=\"btn btn-dark\" style=\"margin-bottom:12px;font-size:13px;\" onclick=\"selectedViaje=null;render()\">← Volver</button>";

    // Header card
    html+="<div class=\"card card-gold\">";
    html+="<div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;\">";
    html+="<div><div style=\"font-size:18px;font-weight:700;color:#c9a227;\">✈️ "+v.name+"</div>";
    if(v.desc)html+="<div style=\"font-size:12px;color:#4a4a6a;margin-top:2px;\">"+v.desc+"</div>";
    html+="<div style=\"font-size:11px;color:#4a4a6a;font-family:monospace;margin-top:4px;\">"+v.date+"</div></div>";
    html+="<span style=\"font-size:14px;cursor:pointer;color:#ef5350;\" onclick=\"doDeleteViajeConfirm("+v.id+")\">🗑️</span>";
    html+="</div>";
    html+="<div style=\"display:flex;justify-content:space-around;margin:10px 0;\">";
    html+="<div style=\"text-align:center;\"><div style=\"font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:3px;\">TOTAL</div><div style=\"font-size:20px;font-weight:700;color:#c9a227;\">"+fmtS(total)+"</div></div>";
    html+="<div style=\"width:1px;background:#1e1e3a;\"></div>";
    html+="<div style=\"text-align:center;\"><div style=\"font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:3px;\">COMPARTIDO</div><div style=\"font-size:20px;font-weight:700;color:#4db6ac;\">"+fmtS(sharedTotal)+"</div></div>";
    html+="<div style=\"width:1px;background:#1e1e3a;\"></div>";
    html+="<div style=\"text-align:center;\"><div style=\"font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:3px;\">GASTOS</div><div style=\"font-size:20px;font-weight:700;color:#f0eff4;\">"+vEntries.length+"</div></div>";
    html+="</div>";
    if(sharedTotal>0){
      if(Math.abs(balA)>1){
        const who=balA>0?(nB+" le debe a "+nA):(nA+" le debe a "+nB);
        const col=balA>0?"#4caf80":"#c9a227";
        const bg=balA>0?"#1e2d1e":"#1a1510";
        const br=balA>0?"#4caf8044":"#c9a22744";
        html+="<div style=\"background:"+bg+";border:1px solid "+br+";border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;\">";
        html+="<span style=\"font-size:13px;color:"+col+";\">"+(who)+"</span>";
        html+="<span style=\"font-size:18px;font-weight:700;color:"+col+";font-family:monospace;\">"+fmt(Math.abs(balA))+"</span></div>";
      }else{
        html+="<div style=\"font-size:13px;color:#4caf80;text-align:center;padding:6px;\">✅ Al día en este viaje</div>";
      }
    }
    html+="</div>";

    // Tab buttons
    const c0=viajeTab==="list"?"#c9a227":"#4a4a6a";
    const c1=viajeTab==="assign"?"#c9a227":"#4a4a6a";

  html+="<input type=\"date\" value=\""+newViaje.date+"\" onchange=\"newViaje.date=this.value\"/>";

  if(viajes.length===0){
    html+="<div style=\"text-align:center;color:#4a4a6a;margin-top:30px;font-size:14px;\"><div style=\"font-size:40px;margin-bottom:12px;\">✈️</div>Sin viajes aún</div>";
  }else{
    html+="<div style=\"font-size:10px;color:#4a4a6a;font-family:monospace;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;\">Tus viajes</div>";

  return html;

    ${settled.length>0?`<div class="card">
      <div class="ct">✓ Préstamos saldados</div>
      ${settled.map(l=>`<div class="row" style="padding:8px 0;border-bottom:1px solid #1e1e3a;">

        <div style="text-align:right;"><div style="font-size:13px;color:#4caf80;font-family:monospace;font-weight:600;">${fmt(l.amount)}</div><div style="font-size:10px;color:#4caf80;">✓ saldado</div></div>

  </div>`;
}


// ── Cuentas por categoría ──────────────────────────────────────────────────
function renderCuentas(){
  const d=D();
  // New entries notification
  const currentCount=(d.entries||[]).length;
  const newCount=currentCount-lastSeenCount;
  const sp=d.split||{A:50,B:50};
  const spA=sp.A/100,spB=sp.B/100;
  const nA=d.names.A,nB=d.names.B;
  const allMonths=[...new Set((d.entries||[]).map(e=>e.date&&e.date.slice(0,7)).filter(Boolean))].sort().reverse();

  const entries=(d.entries||[]).filter(e=>{
    if(e.type!=="expense")return false;
    if(cuentasMonth!=="all"&&!(e.date&&e.date.startsWith(cuentasMonth)))return false;
    return true;
  });

  const bycat={};
  entries.forEach(e=>{
    if(!bycat[e.category])bycat[e.category]={cat:e.category,total:0,paidSharedByA:0,paidSharedByB:0,sharedTotal:0,ownA:0,ownB:0,entries:[]};
    const c=bycat[e.category];
    c.total+=e.amount;c.entries.push(e);
    if(e.user==="shared"){c.sharedTotal+=e.amount;if(e.paidBy==="A")c.paidSharedByA+=e.amount;else c.paidSharedByB+=e.amount;}
    else if(e.user==="A")c.ownA+=e.amount;
    else if(e.user==="B")c.ownB+=e.amount;
  });

  const cats=Object.values(bycat).sort((a,b)=>b.total-a.total);
  const grandTotal=cats.reduce((s,c)=>s+c.total,0);
  const grandShared=cats.reduce((s,c)=>s+c.sharedTotal,0);
  const grandOwn=cats.reduce((s,c)=>s+c.ownA+c.ownB,0);

  // Global balance on shared expenses
  const totalAPaid=cats.reduce((s,c)=>s+c.paidSharedByA,0);
  const totalBPaid=cats.reduce((s,c)=>s+c.paidSharedByB,0);
  const totalSharedAll=cats.reduce((s,c)=>s+c.sharedTotal,0);
  const globalBalA=totalAPaid-(totalSharedAll*spA); // positive = B owes A

  let html='<div class="sec">';

  // Month filter
  html+='<select style="margin-bottom:12px;" onchange="cuentasMonth=this.value;render()">';
  html+='<option value="all"'+(cuentasMonth==="all"?" selected":"")+'>Todos los meses</option>';
  allMonths.forEach(m=>{html+='<option value="'+m+'"'+(cuentasMonth===m?" selected":"")+'>'+m+'</option>';});
  html+='</select>';

  // Global summary card
  html+='<div class="card card-gold">';
  html+='<div class="ct">Resumen general'+(cuentasMonth!=="all"?" — "+cuentasMonth:"")+'</div>';
  html+='<div style="display:flex;justify-content:space-around;margin-bottom:12px;">';
  html+='<div style="text-align:center;"><div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:3px;">TOTAL</div><div style="font-size:22px;font-weight:700;color:#c9a227;">'+fmtS(grandTotal)+'</div></div>';
  html+='<div style="width:1px;background:#1e1e3a;"></div>';
  html+='<div style="text-align:center;"><div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:3px;">COMPARTIDO</div><div style="font-size:22px;font-weight:700;color:#4db6ac;">'+fmtS(grandShared)+'</div></div>';
  html+='<div style="width:1px;background:#1e1e3a;"></div>';
  html+='<div style="text-align:center;"><div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:3px;">PROPIOS</div><div style="font-size:22px;font-weight:700;color:#ba68c8;">'+fmtS(grandOwn)+'</div></div>';
  html+='</div>';

  if(Math.abs(globalBalA)>1){
    const whoGlobal=globalBalA>0?(nB+' le debe a '+nA):(nA+' le debe a '+nB);
    const colorG=globalBalA>0?"#4caf80":"#c9a227";
    html+='<div style="background:'+(globalBalA>0?"#1e2d1e":"#1a1510")+';border:1px solid '+(globalBalA>0?"#4caf8044":"#c9a22744")+';border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;">';
    html+='<div><div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:2px;">BALANCE GLOBAL COMPARTIDOS</div>';
    html+='<div style="font-size:13px;color:'+colorG+';">'+whoGlobal+'</div></div>';
    html+='<div style="font-size:22px;font-weight:700;color:'+colorG+';font-family:monospace;">'+fmt(Math.abs(globalBalA))+'</div>';
    html+='</div>';
  }else{
    html+='<div style="font-size:13px;color:#4caf80;text-align:center;padding:6px;">✅ Balance global al día</div>';
  }
  html+='</div>';

  if(cats.length===0){
    html+='<div style="text-align:center;color:#4a4a6a;margin-top:40px;font-size:14px;">Sin gastos'+(cuentasMonth!=="all"?" este mes":"")+'</div>';
    html+='</div>';return html;
  }

  html+='<div style="font-size:10px;color:#4a4a6a;font-family:monospace;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;">Por categoría — toca para ver detalle</div>';

  cats.forEach(c=>{
    const shouldA=c.sharedTotal*spA;
    const shouldB=c.sharedTotal*spB;
    const catBalA=c.paidSharedByA-shouldA;
    const hasImbalance=c.sharedTotal>0&&Math.abs(catBalA)>1;
    const whocat=catBalA>0?(nB+' le debe a '+nA):(nA+' le debe a '+nB);
    const catAmt=Math.abs(catBalA);
    const expanded=cuentasExpanded[c.cat];
    const color=c.sharedTotal>0?"#c9a227":c.ownA>0&&c.ownB===0?"#64b5f6":c.ownB>0&&c.ownA===0?"#ff8a65":"#4db6ac";

    html+='<div class="card" style="margin-bottom:10px;">';

    // Header row - tappable
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;" onclick="cuentasExpanded[\''+c.cat.replace(/'/g,"\\'")+'\']=!cuentasExpanded[\''+c.cat.replace(/'/g,"\\'")+'\'];render()">';
    html+='<div style="flex:1;">';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-size:20px;">'+icon(c.cat)+'</span><span style="font-size:15px;font-weight:700;">'+c.cat+'</span></div>';
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;">';

    if(c.ownA>0)html+='<span class="tag" style="background:#64b5f618;color:#64b5f6;border:1px solid #64b5f633;">'+nA+' '+fmtS(c.ownA)+'</span>';
    if(c.ownB>0)html+='<span class="tag" style="background:#ff8a6518;color:#ff8a65;border:1px solid #ff8a6533;">'+nB+' '+fmtS(c.ownB)+'</span>';
    html+='</div></div>';
    html+='<div style="text-align:right;flex-shrink:0;margin-left:8px;">';
    html+='<div style="font-size:20px;font-weight:700;color:'+color+';">'+fmtS(c.total)+'</div>';
    html+='<div style="font-size:11px;color:#4a4a6a;font-family:monospace;">'+c.entries.length+' reg.</div>';
    html+='<div style="font-size:13px;color:#4a4a6a;margin-top:2px;">'+(expanded?'▲':'▼')+'</div>';
    html+='</div></div>';

    // Shared breakdown (always visible if has shared)
    if(c.sharedTotal>0){
      html+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid #1e1e3a;">';
      html+='<div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:8px;">DESGLOSE COMPARTIDO — '+sp.A+'/'+sp.B+'</div>';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:8px;">';
      html+='<div style="text-align:center;flex:1;"><div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:2px;">PAGÓ '+nA.toUpperCase()+'</div><div style="font-size:16px;font-weight:700;color:#64b5f6;">'+fmt(c.paidSharedByA)+'</div><div style="font-size:10px;color:#4a4a6a;font-family:monospace;">debía '+fmt(shouldA)+'</div></div>';
      html+='<div style="width:1px;background:#1e1e3a;"></div>';
      html+='<div style="text-align:center;flex:1;"><div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:2px;">TOTAL CAT.</div><div style="font-size:16px;font-weight:700;color:#c9a227;">'+fmt(c.sharedTotal)+'</div></div>';
      html+='<div style="width:1px;background:#1e1e3a;"></div>';
      html+='<div style="text-align:center;flex:1;"><div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:2px;">PAGÓ '+nB.toUpperCase()+'</div><div style="font-size:16px;font-weight:700;color:#ff8a65;">'+fmt(c.paidSharedByB)+'</div><div style="font-size:10px;color:#4a4a6a;font-family:monospace;">debía '+fmt(shouldB)+'</div></div>';
      html+='</div>';

      if(hasImbalance){
        const colorCat=catBalA>0?"#4caf80":"#c9a227";
        const fromCat=catBalA>0?"B":"A";
        const toCat=catBalA>0?"A":"B";
        html+='<div style="background:'+(catBalA>0?"#1e2d1e":"#1a1510")+';border:1px solid '+(catBalA>0?"#4caf8044":"#c9a22744")+';border-radius:10px;padding:10px 12px;margin-bottom:8px;">';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
        html+='<span style="font-size:12px;color:'+colorCat+';">'+whocat+'</span>';
        html+='<span style="font-size:16px;font-weight:700;color:'+colorCat+';font-family:monospace;">'+fmt(catAmt)+'</span>';
        html+='</div>';
        const safecat=encodeURIComponent(c.cat);
        html+='<button class="btn btn-green" style="margin-bottom:0;font-size:12px;padding:9px;" data-cat="'+safecat+'" data-am="'+catAmt+'" data-fr="'+fromCat+'" data-to="'+toCat+'" onclick="event.stopPropagation();doSaldarFromBtn(this)">✓ Registrar saldo de esta categoría</button>';
        html+='</div>';
      }else{
        html+='<div style="font-size:12px;color:#4caf80;text-align:center;padding:6px;">✓ Al día en esta categoría</div>';
      }
      html+='</div>';
    }

    // Expanded: individual entries
    if(expanded){
      html+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid #1e1e3a;">';
      html+='<div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:8px;">REGISTROS ('+c.entries.length+')</div>';
      c.entries.slice().sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{
        html+='<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e1e3a22;align-items:center;">';
        html+='<div><div style="font-size:13px;margin-bottom:3px;">'+e.description+'</div>';
        html+='<div style="display:flex;gap:5px;flex-wrap:wrap;">';
        html+='<span class="tag" style="background:#4a4a8a18;color:#8080c0;border:1px solid #4a4a8a33;">'+(e.user==="shared"?"compartido":"solo "+nm(e.user))+'</span>';
        if(e.paidBy)html+='<span class="tag" style="background:#ff8a6518;color:#ff8a65;border:1px solid #ff8a6533;">pagó '+nm(e.paidBy)+'</span>';
        html+='<span style="font-size:10px;color:#4a4a6a;font-family:monospace;">'+e.date+'</span>';
        html+='</div></div>';
        html+='<div style="text-align:right;flex-shrink:0;margin-left:8px;">';
        html+='<div style="font-size:14px;font-weight:700;font-family:monospace;">'+fmtS(e.amount)+'</div>';
        html+='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">';
        html+='<span style="font-size:14px;cursor:pointer;" onclick="event.stopPropagation();doEditEntry('+e.id+')">✏️</span>';
        html+='<span style="font-size:'+(confirmDeleteId===e.id?11:14)+'px;cursor:pointer;color:'+(confirmDeleteId===e.id?"#ef5350":"inherit")+';font-family:monospace;" onclick="event.stopPropagation();doDeleteEntry('+e.id+')">'+(confirmDeleteId===e.id?"¿Seguro?":"🗑️")+'</span>';
        html+='</div></div>';
        html+='</div>';
      });
      // Cat settled history
      const catHistory=(d.catSettled||[]).filter(s=>s.cat===c.cat);
      if(catHistory.length>0){
        html+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid #1e1e3a;">';
        html+='<div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-bottom:6px;">SALDOS REGISTRADOS</div>';
        catHistory.slice().reverse().forEach(s=>{
          html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e1e3a22;">';
          html+='<div><div style="font-size:12px;color:#4caf80;">✓ '+nm(s.from)+' → '+nm(s.to)+'</div>';
          html+='<div style="font-size:10px;color:#4a4a6a;font-family:monospace;">'+s.date+'</div></div>';
          html+='<div style="font-size:13px;font-weight:700;color:#4caf80;font-family:monospace;">'+fmt(s.amount)+'</div>';
          html+='</div>';
        });
        html+='</div>';
      }
      html+='</div>';
    }

    html+='</div>';
  });

  html+='</div>';
  return html;
}


// ── Gráficas ───────────────────────────────────────────────────────────────
function renderGraficas(){
  const d=D();
  const allMonths=[...new Set((d.entries||[]).map(e=>e.date&&e.date.slice(0,7)).filter(Boolean))].sort().reverse();
  const cm={};
  (d.entries||[]).filter(e=>e.type==="expense"&&(chartMonth==="all"||e.date&&e.date.startsWith(chartMonth))&&(chartUser==="all"||e.user===chartUser)).forEach(e=>{cm[e.category]=(cm[e.category]||0)+e.amount;});
  const cats=Object.entries(cm).sort(([,a],[,b])=>b-a);
  const total=cats.reduce((s,[,v])=>s+v,0);
  const ms={};
  (d.entries||[]).forEach(e=>{const m=e.date&&e.date.slice(0,7);if(!m)return;if(!ms[m])ms[m]={shared:0,A:0,B:0};if(e.type==="expense"){if(e.user==="shared")ms[m].shared+=e.amount;else if(e.user==="A")ms[m].A+=e.amount;else if(e.user==="B")ms[m].B+=e.amount;}});
  const months=Object.entries(ms).sort(([a],[b])=>a.localeCompare(b)).slice(-6);
  const allIncA=(d.entries||[]).filter(e=>e.type==="income"&&e.user==="A").reduce((s,e)=>s+e.amount,0);
  const allIncB=(d.entries||[]).filter(e=>e.type==="income"&&e.user==="B").reduce((s,e)=>s+e.amount,0);
  const allExpA=(d.entries||[]).filter(e=>e.type==="expense"&&e.user==="A").reduce((s,e)=>s+e.amount,0);
  const allExpB=(d.entries||[]).filter(e=>e.type==="expense"&&e.user==="B").reduce((s,e)=>s+e.amount,0);
  const allExpS=(d.entries||[]).filter(e=>e.type==="expense"&&e.user==="shared").reduce((s,e)=>s+e.amount,0);
  const spA=d.split.A/100,spB=d.split.B/100;
  const nA=allIncA-allExpA-allExpS*spA,nB=allIncB-allExpB-allExpS*spB;

  // Donut SVG
  let donutSvg="";
  if(cats.length>0&&total>0){
    let ang=-90;
    const R=60,r=35,cx=70,cy=70;
    const slices=cats.slice(0,8).map(([k,v],i)=>{
      const pct=v/total,a1=ang,a2=ang+pct*360;ang=a2;
      if(cats.length===1)return`<circle cx="${cx}" cy="${cy}" r="${R}" fill="${PAL[0]}" stroke="#0a0a12" stroke-width="2"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="#0a0a12"/>`;
      const x1=cx+R*Math.cos(a1*Math.PI/180),y1=cy+R*Math.sin(a1*Math.PI/180);
      const x2=cx+R*Math.cos(a2*Math.PI/180),y2=cy+R*Math.sin(a2*Math.PI/180);
      const xi1=cx+r*Math.cos(a1*Math.PI/180),yi1=cy+r*Math.sin(a1*Math.PI/180);
      const xi2=cx+r*Math.cos(a2*Math.PI/180),yi2=cy+r*Math.sin(a2*Math.PI/180);
      const lg=pct>0.5?1:0;
      return`<path d="M${xi1},${yi1} L${x1},${y1} A${R},${R} 0 ${lg},1 ${x2},${y2} L${xi2},${yi2} A${r},${r} 0 ${lg},0,${xi1},${yi1} Z" fill="${PAL[i%PAL.length]}" stroke="#0a0a12" stroke-width="1.5"/>`;
    });
    donutSvg=`<svg width="140" height="140" viewBox="0 0 140 140">${slices.join("")}<text x="70" y="66" text-anchor="middle" fill="#f0eff4" font-size="10" font-family="monospace">Total</text><text x="70" y="80" text-anchor="middle" fill="#c9a227" font-size="10" font-family="monospace">${fmtS(total)}</text></svg>`;
  }

  return`<div class="sec">
    <div class="card">
      <div class="ct">Gastos por categoría</div>
      <div class="chips">
        ${[["all","Todos"],["A",d.names.A],["B",d.names.B],["shared","Compartido"]].map(([v,l])=>`<div class="chip${chartUser===v?" on":""}" onclick="chartUser='${v}';render()">${l}</div>`).join("")}
      </div>
      <select style="margin-bottom:14px;" onchange="chartMonth=this.value;render()">
        <option value="all"${chartMonth==="all"?" selected":""}>Todos los meses</option>
        ${allMonths.map(m=>`<option value="${m}"${chartMonth===m?" selected":""}>${m}</option>`).join("")}
      </select>
      ${cats.length>0?`<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
        ${donutSvg}
        <div style="flex:1;min-width:120px;">
          ${cats.slice(0,7).map(([k,v],i)=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;">
            <div style="width:8px;height:8px;border-radius:2px;background:${PAL[i%PAL.length]};flex-shrink:0;"></div>
            <div style="flex:1;font-size:11px;color:#8080a0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${icon(k)} ${k}</div>
            <div style="font-size:11px;font-family:monospace;flex-shrink:0;">${fmtS(v)}</div>
          </div>`).join("")}
        </div>
      </div>`:`<div style="text-align:center;color:#4a4a6a;font-size:12px;padding:20px;">Sin datos este período</div>`}
    </div>
    ${months.length>1?`<div class="card">
      <div class="ct">Evolución mensual</div>
      ${months.map(([m,v])=>`<div style="margin-bottom:12px;">
        <div class="row" style="margin-bottom:4px;"><span style="font-size:12px;font-family:monospace;color:#8080a0;">${m}</span><span style="font-size:12px;font-family:monospace;font-weight:600;">${fmtS(v.shared+v.A+v.B)}</span></div>
        <div style="display:flex;height:10px;border-radius:5px;overflow:hidden;gap:1px;">
          ${v.shared>0?`<div style="flex:${v.shared};background:#c9a227;"></div>`:""}
          ${v.A>0?`<div style="flex:${v.A};background:#64b5f6;"></div>`:""}
          ${v.B>0?`<div style="flex:${v.B};background:#ff8a65;"></div>`:""}
        </div>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <span style="font-size:9px;color:#c9a227;font-family:monospace;">■ ${fmtS(v.shared)}</span>
          <span style="font-size:9px;color:#64b5f6;font-family:monospace;">■ ${d.names.A} ${fmtS(v.A)}</span>
          <span style="font-size:9px;color:#ff8a65;font-family:monospace;">■ ${d.names.B} ${fmtS(v.B)}</span>
        </div>
      </div>`).join("")}
    </div>`:""}
    <div class="card">
      <div class="ct">Proyección de ahorro</div>
      <div class="row"><span class="lbl">Flujo ${d.names.A}/mes</span><span class="val" style="color:${nA>=0?"#4caf80":"#ef5350"};">${fmt(nA)}</span></div>
      <div class="row"><span class="lbl">Flujo ${d.names.B}/mes</span><span class="val" style="color:${nB>=0?"#4caf80":"#ef5350"};">${fmt(nB)}</span></div>
      <div class="div"></div>
      ${[3,6,12].map(m=>`<div class="row"><span class="lbl">En ${m} meses</span><span style="font-size:18px;font-weight:700;color:#c9a227;">${fmtS((nA+nB)*m)}</span></div>`).join("")}
    </div>
  </div>`;
}

// ── Ajustes ────────────────────────────────────────────────────────────────
function renderAjustes(){

    ${settingsTab==="names"?`<div class="card">

      <label class="fl">Persona B</label><input id="name-b" type="text" value="${d.names.B}"/>

        <div style="text-align:center;"><div style="font-size:36px;font-weight:700;color:#64b5f6;" id="split-a-lbl">${d.split.A}%</div><div style="font-size:12px;color:#4a4a6a;">${d.names.A}</div></div>
        <div style="text-align:center;"><div style="font-size:36px;font-weight:700;color:#ff8a65;" id="split-b-lbl">${d.split.B}%</div><div style="font-size:12px;color:#4a4a6a;">${d.names.B}</div></div>

      <button class="btn" onclick="doSaveSplit()">Guardar</button>

          <div class="chip${newCat.type==="personal"?" on":""}" onclick="newCat.type='personal';render()">Personal</div>

      </div>
      ${[["shared","Compartidas"],["personal","Personales"]].map(([type,lbl])=>`<div class="card">
        <div class="ct">${lbl}</div>
        ${(d.cats[type]||[]).map((c,idx)=>{
          const isEd=editCatIdx&&editCatIdx.type===type&&editCatIdx.idx===idx;
          if(isEd)return`<div class="ie-row"><input id="edit-cat-inp" type="text" value="${editCatVal.replace(/"/g,"&quot;")}" oninput="editCatVal=this.value"/><button class="btn-sm" style="background:#4caf80;color:#fff;" onclick="doSaveCat()">✓</button><button class="btn-sm" style="background:#1e1e3a;color:#f0eff4;" onclick="editCatIdx=null;render()">✕</button></div>`;
          return`<div class="row" style="padding:8px 0;border-bottom:1px solid #1e1e3a;"><span style="font-size:13px;">${catDisplay(c)}</span><div style="display:flex;gap:10px;"><span style="font-size:14px;cursor:pointer;" data-type="${type}" data-idx="${idx}" onclick="doStartEditCat(this.dataset.type,Number(this.dataset.idx))">✏️</span><span style="font-size:14px;cursor:pointer;" data-type="${type}" data-cat="${encodeURIComponent(c)}" onclick="doDeleteCatFromBtn(this)">🗑️</span></div></div>`;

      <div class="card">

        <label class="fl">Fecha límite</label><input id="g-deadline" type="date" value="${newGoal.deadline||""}"/>
        <button class="btn" onclick="doAddGoal()">+ Crear meta</button>

// ── Proyección ─────────────────────────────────────────────────────────────
function moKey(yr,mo){return yr+"-"+String(mo).padStart(2,"0");}
function moElapsed(startKey,curKey){
  const sy=parseInt(startKey.slice(0,4)),sm=parseInt(startKey.slice(5));
  const cy=parseInt(curKey.slice(0,4)),cm=parseInt(curKey.slice(5));
  return(cy-sy)*12+(cm-sm);
}

function buildProjection(d,n){
  n=n||12;
  const rows=[];
  const now=new Date();
  // Pre-build set of recurring debt IDs to avoid double-counting
  const recDebtCats=new Set((d.recurring||[]).filter(r=>r.type==="debt"&&(r.debtMonths||0)>1).map(r=>r.category+"|"+r.description));
  for(let i=0;i<n;i++){
    const date=new Date(now.getFullYear(),now.getMonth()+i,1);
    const key=moKey(date.getFullYear(),date.getMonth()+1);
    let income=0,expenses=0;
    // Recurring items
    (d.recurring||[]).forEach(r=>{
      const ov=(r.overrides&&r.overrides[key]!=null)?r.overrides[key]:null;
      if(r.type==="debt"&&(r.debtMonths||0)>1){
        const monthly=Math.round(r.amount/(r.debtMonths));
        const startKey=(r.debtStart||key).slice(0,7);
        const elapsed=moElapsed(startKey,key);
        if(elapsed<0||elapsed>=(r.debtMonths))return;
        expenses+=ov!=null?ov:monthly;
      }else{
        const amt=ov!=null?ov:r.amount;
        if(r.type==="income")income+=amt;
        else expenses+=amt;
      }
    });
    // Non-recurring debt entries with installments (no duplicate with recurring)
    (d.entries||[]).filter(e=>e.type==="debt"&&(e.debtMonths||0)>1&&!e.isRecurring).forEach(e=>{
      const startKey=(e.debtStart||e.date||"").slice(0,7);
      if(!startKey)return;
      const elapsed=moElapsed(startKey,key);
      if(elapsed<0||elapsed>=(e.debtMonths))return;
      // Skip if covered by a recurring item
      if(recDebtCats.has(e.category+"|"+(e.description||"")))return;
      expenses+=Math.round(e.amount/(e.debtMonths));
    });
    rows.push({key,mo:String(date.getMonth()+1).padStart(2,"0"),income,expenses,net:income-expenses});
  }
  return rows;
}

function buildProjChart(proj){
  if(!proj||proj.length<1)return"";
  const n=proj.length;
  const W=Math.max(360,n*40),H=180;
  const pL=4,pR=4,pT=14,pB=28;
  const cW=W-pL-pR,cH=H-pT-pB;
  const MNAMES=["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
  const allVals=proj.flatMap(p=>[p.income,p.expenses,p.net,0]);
  const minV=Math.min(...allVals);
  const maxV=Math.max(...allVals,1);
  const range=maxV-minV||1;
  const scY=v=>pT+cH*(1-(v-minV)/range);
  const zY=scY(0);
  const bw=Math.max(6,Math.floor(cW/n*0.38));
  const gW=cW/n;
  let shapes="",netPts=[];
  proj.forEach((p,i)=>{
    const cx=pL+gW*i+gW/2;
    const x1=cx-bw-1,x2=cx+1;
    if(p.income>0){const y=scY(p.income);shapes+=`<rect x="${x1.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${Math.max(1,zY-y).toFixed(1)}" rx="2" fill="#4caf8070"/>`;}
    if(p.expenses>0){const y=scY(p.expenses);shapes+=`<rect x="${x2.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${Math.max(1,zY-y).toFixed(1)}" rx="2" fill="#ef535070"/>`;}
    const moIdx=parseInt(p.key.slice(5))-1;
    shapes+=`<text x="${cx.toFixed(1)}" y="${(H-6).toFixed(1)}" text-anchor="middle" font-size="8" fill="#3a3a5a" font-family="monospace">${MNAMES[moIdx]||p.key.slice(5)}</text>`;
    const ny=Math.max(pT+1,Math.min(pT+cH-1,scY(p.net)));
    netPts.push([cx,ny]);
  });
  const netPath=netPts.map((pt,i)=>(i===0?"M":"L")+pt[0].toFixed(1)+" "+pt[1].toFixed(1)).join(" ");
  const netDots=netPts.map(pt=>`<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="2.5" fill="#c9a227"/>`).join("");
  const gridLines=[0.25,0.5,0.75].map(f=>{
    const y=(pT+cH*(1-f)).toFixed(1);
    return`<line x1="${pL}" x2="${W-pR}" y1="${y}" y2="${y}" stroke="#1e1e3a" stroke-width="0.5"/>`;
  }).join("");
  return`<div style="overflow-x:auto;background:#08080f;border-radius:8px;padding:4px 2px;margin:0 -2px;">
  <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="display:block;">
    ${gridLines}
    <line x1="${pL}" x2="${W-pR}" y1="${zY.toFixed(1)}" y2="${zY.toFixed(1)}" stroke="#2a2a4a" stroke-width="1"/>
    ${shapes}
    <path d="${netPath}" fill="none" stroke="#c9a227" stroke-width="2" stroke-linejoin="round"/>
    ${netDots}
  </svg>
  </div>
  <div style="display:flex;gap:14px;justify-content:center;margin-top:6px;">
    <span style="font-size:10px;font-family:monospace;color:#4caf80;">■ Ingresos</span>
    <span style="font-size:10px;font-family:monospace;color:#ef5350;">■ Egresos</span>
    <span style="font-size:10px;font-family:monospace;color:#c9a227;">— Flujo neto</span>
  </div>`;
}

function amortize(balance,monthlyRate,months){
  if(!balance||!monthlyRate||!months||months<1)return[];
  const payment=balance*monthlyRate/(1-Math.pow(1+monthlyRate,-months));
  const rows=[];
  let rem=balance;
  for(let m=0;m<months&&rem>0.5;m++){
    const interest=rem*monthlyRate;
    const principal=Math.min(payment-interest,rem);
    rem-=principal;
    rows.push({m:m+1,payment:Math.round(payment),interest:Math.round(interest),principal:Math.round(principal),remaining:Math.max(0,Math.round(rem))});
  }
  return rows;
}

  return`<div style="border-top:1px solid #1e1e3a;margin-top:8px;padding-top:12px;">
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">

        <div class="fl">Saldo actual</div>

      </div>
      <div style="flex:1;min-width:90px;">
        <div class="fl">Tasa mensual %</div>
        <input type="text" style="margin:0;font-size:13px;padding:8px 10px;" value="${projAmorData.rate}" oninput="projAmorData.rate=this.value" placeholder="Ej: 1.2"/>
      </div>
      <div style="flex:1;min-width:90px;">
        <div class="fl">Plazo (meses)</div>
        <input type="text" style="margin:0;font-size:13px;padding:8px 10px;" value="${projAmorData.months}" oninput="projAmorData.months=this.value" placeholder="Ej: 120"/>
      </div>
    </div>
    <button class="btn btn-dark" style="margin-bottom:10px;" onclick="render()">Calcular amortización →</button>
    ${rows.length>0?`
      <div style="font-size:12px;color:#4caf80;font-family:monospace;margin-bottom:8px;">Cuota mensual: ${fmt(rows[0].payment)} &nbsp;·&nbsp; Total intereses: ${fmt(totalInterest)}</div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:11px;">
          <thead><tr style="border-bottom:1px solid #1e1e3a;">
            <th style="text-align:right;font-family:monospace;font-size:9px;color:#4a4a6a;text-transform:uppercase;padding:4px 6px;">#</th>
            <th style="text-align:right;font-family:monospace;font-size:9px;color:#f0eff4;text-transform:uppercase;padding:4px 6px;">Cuota</th>
            <th style="text-align:right;font-family:monospace;font-size:9px;color:#64b5f6;text-transform:uppercase;padding:4px 6px;">Capital</th>
            <th style="text-align:right;font-family:monospace;font-size:9px;color:#ef5350;text-transform:uppercase;padding:4px 6px;">Interés</th>
            <th style="text-align:right;font-family:monospace;font-size:9px;color:#c9a227;text-transform:uppercase;padding:4px 6px;">Saldo</th>
          </tr></thead>
          <tbody>${rows.slice(0,24).map((rw,i)=>`
            <tr style="border-bottom:1px solid #1e1e3a22;${i%2===0?"":"background:#0e0e1a55;"}">
              <td style="font-family:monospace;color:#4a4a6a;text-align:right;padding:3px 6px;">${rw.m}</td>
              <td style="font-family:monospace;color:#f0eff4;text-align:right;padding:3px 6px;">${fmtS(rw.payment)}</td>
              <td style="font-family:monospace;color:#64b5f6;text-align:right;padding:3px 6px;">${fmtS(rw.principal)}</td>
              <td style="font-family:monospace;color:#ef5350;text-align:right;padding:3px 6px;">${fmtS(rw.interest)}</td>
              <td style="font-family:monospace;color:#c9a227;text-align:right;padding:3px 6px;">${fmtS(rw.remaining)}</td>
            </tr>`).join("")}
          ${rows.length>24?`<tr><td colspan="5" style="text-align:center;color:#4a4a6a;font-family:monospace;font-size:10px;padding:8px;">... ${rows.length-24} cuotas más (total: ${rows.length} meses)</td></tr>`:""}
          </tbody>
        </table>
      </div>
    `:`<div class="help-box" style="margin-top:0;">Ingresa saldo, tasa mensual y plazo para calcular.</div>`}
  </div>`;
}

function renderProyeccion(){
  const d=D();
  const proj=buildProjection(d,projMonths);
  const totalIncome=proj.reduce((s,p)=>s+p.income,0);
  const totalExpenses=proj.reduce((s,p)=>s+p.expenses,0);
  const avgNet=(totalIncome-totalExpenses)/projMonths;
  const chart=buildProjChart(proj);
  const statsHtml=`
    <div style="display:flex;justify-content:space-around;margin-bottom:14px;text-align:center;">
      <div><div class="fl">Ingresos prom/mes</div><div style="font-size:17px;font-weight:700;color:#4caf80;">${fmtS(totalIncome/projMonths)}</div></div>
      <div style="width:1px;background:#1e1e3a;"></div>
      <div><div class="fl">Egresos prom/mes</div><div style="font-size:17px;font-weight:700;color:#ef5350;">${fmtS(totalExpenses/projMonths)}</div></div>
      <div style="width:1px;background:#1e1e3a;"></div>
      <div><div class="fl">Flujo neto prom</div><div style="font-size:17px;font-weight:700;color:${avgNet>=0?"#4caf80":"#ef5350"};">${fmtS(avgNet)}</div></div>
    </div>`;
  const tableRows=proj.map(p=>`
    <tr>
      <td style="font-family:monospace;font-size:11px;color:#8080a0;padding:4px 6px;white-space:nowrap;">${p.key}</td>
      <td style="font-family:monospace;font-size:12px;color:#4caf80;text-align:right;padding:4px 6px;">${fmtS(p.income)}</td>
      <td style="font-family:monospace;font-size:12px;color:#ef5350;text-align:right;padding:4px 6px;">${fmtS(p.expenses)}</td>
      <td style="font-family:monospace;font-size:13px;font-weight:600;text-align:right;padding:4px 6px;color:${p.net>=0?"#4caf80":"#ef5350"};">${fmtS(p.net)}</td>
    </tr>`).join("");
  const tableHtml=`
    <div style="overflow-x:auto;margin-top:10px;border-top:1px solid #1e1e3a;padding-top:10px;">
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr style="border-bottom:1px solid #1e1e3a;">
          <th style="text-align:left;font-family:monospace;font-size:9px;color:#4a4a6a;text-transform:uppercase;padding-bottom:6px;padding-left:6px;">Mes</th>
          <th style="text-align:right;font-family:monospace;font-size:9px;color:#4caf80;text-transform:uppercase;padding-bottom:6px;">Ingresos</th>
          <th style="text-align:right;font-family:monospace;font-size:9px;color:#ef5350;text-transform:uppercase;padding-bottom:6px;">Egresos</th>
          <th style="text-align:right;font-family:monospace;font-size:9px;color:#c9a227;text-transform:uppercase;padding-bottom:6px;padding-right:6px;">Flujo</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`;
  const recItems=d.recurring||[];
  const varItemsHtml=recItems.length===0?
    `<div class="help-box">No tienes recurrentes. Agrégalos con el checkbox "recurrente" en la pestaña Agregar.</div>`:
    recItems.map(r=>{
      const isExpanded=projExpandedRec===r.id;
      const overrides=r.overrides||{};
      const ovCount=Object.keys(overrides).length;
      const monthRows=isExpanded?proj.map(p=>{
        const isEditing=projOverrideEdit&&projOverrideEdit.recId===r.id&&projOverrideEdit.monthKey===p.key;
        const curAmt=(overrides[p.key]!=null)?overrides[p.key]:r.amount;
        const isOv=overrides[p.key]!=null;
        if(isEditing){
          return`<div style="display:flex;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #1e1e3a22;">
            <span style="font-size:11px;color:#6060a0;font-family:monospace;min-width:64px;">${p.key}</span>
            <input id="proj-ov-inp" type="text" style="flex:1;font-size:13px;margin:0;padding:6px 10px;" value="${fmtInit(projOverrideVal)}" oninput="fmtAmountInput(this,v=>projOverrideVal=v)" placeholder="${fmtInit(r.amount)}"/>
            <button class="btn-sm" style="background:#4caf80;color:#fff;" onclick="event.stopPropagation();doSaveOverride()">✓</button>
            <button class="btn-sm btn-dark" onclick="event.stopPropagation();projOverrideEdit=null;render()">✕</button>
          </div>`;
        }
        return`<div style="display:flex;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #1e1e3a22;">
          <span style="font-size:11px;color:#6060a0;font-family:monospace;min-width:64px;">${p.key}</span>
          <span style="flex:1;font-size:13px;font-family:monospace;color:${isOv?"#c9a227":"#f0eff4"};">${fmtS(curAmt)}</span>
          <button class="btn-sm btn-dark" onclick="event.stopPropagation();doStartOverrideEdit(${r.id},'${p.key}',${curAmt})">✏️</button>
          ${isOv?`<button class="btn-sm" style="background:#1e1e3a;color:#ef5350;border:1px solid #ef535033;" onclick="event.stopPropagation();doClearOverride(${r.id},'${p.key}')">✕</button>`:""}
        </div>`;
      }).join(""):"";
      return`<div class="card" style="margin-bottom:8px;">
        <div class="row" style="cursor:pointer;" onclick="doToggleProjRec(${r.id})">
          <div>
            <div style="font-size:13px;font-weight:600;">${icon(r.category)} ${r.description}</div>
            <div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-top:2px;">${r.type==="income"?"💰 Ingreso":"💸 Egreso"} · base: ${fmtS(r.amount)}${ovCount>0?" · "+ovCount+" ajuste"+(ovCount!==1?"s":""):""}</div>
          </div>
          <span style="font-size:13px;color:#4a4a6a;">${isExpanded?"▲":"▼"}</span>
        </div>
        ${isExpanded?`<div style="margin-top:6px;border-top:1px solid #1e1e3a;padding-top:6px;">${monthRows}</div>`:""}
      </div>`;
    }).join("");
  const debtRecs=recItems.filter(r=>r.type==="expense"||r.type==="debt");
  const amorHtml=debtRecs.length===0?"":debtRecs.map(r=>{
    const isOpen=projAmorId===r.id;
    return`<div class="card" style="margin-bottom:8px;">
      <div class="row" style="cursor:pointer;" onclick="doToggleAmor(${r.id})">
        <div>
          <div style="font-size:13px;font-weight:600;">${icon(r.category)} ${r.description}</div>
          <div style="font-size:10px;color:#4a4a6a;font-family:monospace;margin-top:2px;">Cuota base: ${fmtS(r.amount)}</div>
        </div>
        <span style="font-size:13px;color:#4a4a6a;">${isOpen?"▲":"▼"}</span>
      </div>
      ${isOpen?renderAmortSection(r):""}
    </div>`;
  }).join("");
  return`<div class="sec">
    <div class="card">
      <div class="ct">Proyección de flujo de caja</div>
      <div class="help-box">Basado en tus ingresos y gastos recurrentes. Ajusta cuotas variables en la sección de abajo para refinarla.</div>
      <div class="chips" style="margin-bottom:12px;">
        ${[6,12,24].map(n=>`<div class="chip${projMonths===n?" on":""}" onclick="projMonths=${n};render()">${n} meses</div>`).join("")}
      </div>
      ${statsHtml}
      ${chart}
      ${tableHtml}
    </div>
    <div class="ct" style="margin-top:16px;padding-left:2px;">Cuotas variables por mes</div>
    <div class="help-box">Toca un recurrente y edita su valor para un mes específico. Los cambios se reflejan en la proyección arriba.</div>
    ${varItemsHtml}
    ${debtRecs.length>0?`
      <div class="ct" style="margin-top:16px;padding-left:2px;">Amortización de deudas</div>
      <div class="help-box">Ingresa saldo pendiente, tasa mensual (%) y plazo para ver la tabla de pagos e intereses.</div>
      ${amorHtml}
    `:""}
  </div>`;
}

function doToggleProjRec(id){
  const rid=Number(id)||id;
  projExpandedRec=projExpandedRec===rid?null:rid;
  projOverrideEdit=null;
  render();
}

function doToggleAmor(id){
  const rid=Number(id)||id;
  if(projAmorId!==rid)projAmorData={balance:"",rate:"",months:""};
  projAmorId=projAmorId===rid?null:rid;
  render();
}

function doStartOverrideEdit(recId,monthKey,curAmt){
  projOverrideEdit={recId:Number(recId)||recId,monthKey};
  projOverrideVal=String(curAmt||"");
  render();
  setTimeout(()=>{const inp=document.getElementById("proj-ov-inp");if(inp)inp.focus();},50);
}

async function doSaveOverride(){
  if(!projOverrideEdit)return;
  const{recId,monthKey}=projOverrideEdit;
  const amt=Number(projOverrideVal);
  if(isNaN(amt)){projOverrideEdit=null;render();return;}
  const d=D();
  const newRec=(d.recurring||[]).map(r=>{
    if((Number(r.id)||r.id)!==recId)return r;
    const overrides={...(r.overrides||{}),[monthKey]:amt};
    return{...r,overrides};
  });
  projOverrideEdit=null;
  await persist({...d,recurring:newRec});
  showToast("✓ Cuota ajustada");
}

async function doClearOverride(recId,monthKey){
  const rid=Number(recId)||recId;
  const d=D();
  const newRec=(d.recurring||[]).map(r=>{
    if((Number(r.id)||r.id)!==rid)return r;
    const ovs={...(r.overrides||{})};
    delete ovs[monthKey];
    return{...r,overrides:ovs};
  });
  await persist({...d,recurring:newRec});
  showToast("✓ Cuota restablecida");
}

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot(){
  // Load from localStorage as instant fallback
  const cached=localStorage.getItem("finanzas_cache");
  if(cached){try{localData=migrate(JSON.parse(cached));}catch(e){}}
  if(!localData)localData=emptyState();
  render();

  // Load from Firebase
  const remote=await loadFromFirebase();
  if(remote){
    fbOnline=true;
    localData=migrate(remote);
    localStorage.setItem("finanzas_cache",JSON.stringify(localData));
    if(lastSeenCount===0&&(localData.entries||[]).length>0){lastSeenCount=(localData.entries||[]).length;localStorage.setItem("lastSeenCount",String(lastSeenCount));}
    render();
  }
  updateSavingUI(false);

  // Poll Firebase every 30s for real-time sync
  setInterval(async()=>{
    const r=await loadFromFirebase();
    if(r){fbOnline=true;localData=migrate(r);localStorage.setItem("finanzas_cache",JSON.stringify(localData));if(tab!=="agregar"&&tab!=="ajustes")render();updateSavingUI(false);}
  },30000);
}

// Override persist to also cache locally
const _persist=persist;
window.persist=async function(nd){
  localStorage.setItem("finanzas_cache",JSON.stringify(nd));
  await _persist(nd);
};

boot();
</script>
